services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      - ${SERVICES_DIR}/core/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    privileged: true
    network_mode: host

  cloudflared:
    container_name: cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    networks:
      - core-net

  caddy:
    image: slothcroissant/caddy-cloudflaredns:2.11.4
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    environment:
      - TZ=Europe/Madrid
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - CADDY_ACME_EMAIL=${CADDY_ACME_EMAIL}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
      - /etc/localtime:/etc/localtime:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:2019/config/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  pihole:
    container_name: pihole
    image: pihole/pihole:2026.05.0
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8283:80/tcp"
    environment:
      TZ: Europe/Madrid
      FTLCONF_webserver_api_password: "${PIHOLE_WEBPASSWORD}"
      FTLCONF_misc_dnsmasq_lines: |-
        address=/*.${DOMAIN}/${PI_IP}
    volumes:
      - ${SERVICES_DIR}/core/pihole/etc-pihole:/etc/pihole
      - ${SERVICES_DIR}/core/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/admin/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15
    container_name: wg-easy
    volumes:
      - ./wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    environment:
      - WG_HOST=vpn.${DOMAIN}
      # UI served over HTTP because TLS is terminated by Caddy
      - INSECURE=true
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:latest
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SERVICES_DIR}/core/portainer/data:/data
      - /etc/localtime:/etc/localtime:ro

  homarr:
    container_name: homarr
    image: ghcr.io/homarr-labs/homarr:latest
    restart: unless-stopped
    ports:
      - "7575:7575"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${SERVICES_DIR}/core/homarr/appdata:/appdata
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Madrid
      - SECRET_ENCRYPTION_KEY=${HOMARR_SECRET_ENCRYPTION_KEY}

  glances:
    image: nicolargo/glances:4.5.5-full
    container_name: glances
    restart: unless-stopped
    pid: host
    ports:
      - "61208:61208"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/os-release:/etc/os-release:ro
    environment:
      - GLANCES_OPT=-w
    networks:
      - core-net

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ${SERVICES_DIR}/core/uptime-kuma:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Europe/Madrid

  cloudflare-ddns:
    container_name: cloudflare-ddns
    image: favonia/cloudflare-ddns:latest
    restart: unless-stopped
    network_mode: host
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
      - DOMAINS=wan.${DOMAIN}
      - PROXIED=false
      - IP6_PROVIDER=none

networks:
  core-net:
    driver: bridge
