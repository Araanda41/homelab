services:
  nextcloud:
    image: nextcloud:34-apache
    container_name: nextcloud
    environment:
      - TZ=Europe/Madrid
      - POSTGRES_HOST=nextcloud-db
      - POSTGRES_DB=${NEXTCLOUD_DB_NAME}
      - POSTGRES_USER=${NEXTCLOUD_DB_USER}
      - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=nube.${DOMAIN} ${HP_IP}
      - OVERWRITEHOST=nube.${DOMAIN}
      - OVERWRITEPROTOCOL=https
      - TRUSTED_PROXIES=${PI_IP}
    volumes:
      - ${SERVICES_DIR}/storage/nextcloud/html:/var/www/html
      - ${MEDIA_ROOT}/nextcloud-pgsql:/var/www/html/data
    ports:
      - "8081:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/status.php >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - storage-net
    depends_on:
      nextcloud-db:
        condition: service_healthy

  nextcloud-db:
    image: postgres:16-alpine
    container_name: nextcloud-db
    environment:
      POSTGRES_PASSWORD: "${NEXTCLOUD_DB_PASSWORD}"
      POSTGRES_USER: "${NEXTCLOUD_DB_USER}"
      POSTGRES_DB: "${NEXTCLOUD_DB_NAME}"
    volumes:
      - ${MEDIA_ROOT}/nextcloud-db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - storage-net

  immich-server:
    image: ghcr.io/immich-app/immich-server:v2.6.2
    container_name: immich_server
    environment:
      - DB_PASSWORD=${IMMICH_DB_PASSWORD}
      - DB_USERNAME=${IMMICH_DB_USER}
      - DB_DATABASE_NAME=${IMMICH_DB_NAME}
      - DB_HOSTNAME=immich-db
      - REDIS_HOSTNAME=immich-redis
      - UPLOAD_LOCATION=/usr/src/app/upload
    volumes:
      - ${SERVICES_DIR}/storage/immich/config:/config
      - ${MEDIA_ROOT}/immich:/usr/src/app/upload
      - ${MEDIA_ROOT}/immich/library:/mnt/immich-library:ro
    ports:
      - "2283:2283"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:2283/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      - immich-db
      - immich-redis
    networks:
      - storage-net

  immich-db:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-db
    environment:
      POSTGRES_PASSWORD: "${IMMICH_DB_PASSWORD}"
      POSTGRES_USER: "${IMMICH_DB_USER}"
      POSTGRES_DB: "${IMMICH_DB_NAME}"
    volumes:
      - ${SERVICES_DIR}/storage/immich/db:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - storage-net

  immich-redis:
    image: redis:6.2-alpine
    container_name: immich-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - storage-net

networks:
  storage-net:
    driver: bridge
