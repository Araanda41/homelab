networks:
  media_default:
    driver: bridge

services:
  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:v1.5.6-ls350
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ${SERVICES_DIR}/media/config/bazarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "6767:6767"
    networks:
      - media_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:6767/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  jellyfin:
    container_name: jellyfin
    image: jellyfin/jellyfin:10.11.11
    environment:
      - TZ=Europe/Madrid
    volumes:
      - ${SERVICES_DIR}/media/config/jellyfin:/config
      - ${MEDIA_ROOT}/media:/data
      - jellyfin_cache:/cache
    ports:
      - "8096:8096"
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card1:/dev/dri/card0
    networks:
      - media_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8096/health >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:2.4.0.5397-ls149
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ${SERVICES_DIR}/media/config/prowlarr:/config
    ports:
      - "9696:9696"
    networks:
      - media_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9696/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  qbittorrent:
    container_name: qbittorrent
    image: lscr.io/linuxserver/qbittorrent:5.2.1_v2.0.13-ls460
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - WEBUI_PORT=8090
    volumes:
      - ${SERVICES_DIR}/media/config/qbit:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "6881:6881"
      - "6881:6881/udp"
      - "8090:8090"
    networks:
      - media_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8090/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:6.2.1.10461-ls305
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ${SERVICES_DIR}/media/config/radarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "7878:7878"
    networks:
      - media_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:7878/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:4.0.17.2952-ls314
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
    volumes:
      - ${SERVICES_DIR}/media/config/sonarr:/config
      - ${MEDIA_ROOT}:/data
    ports:
      - "8989:8989"
    networks:
      - media_default
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8989/ >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  jellyfin_cache:
